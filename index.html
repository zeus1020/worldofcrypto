<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World of Crypto</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/hud.css" />
</head>
<body>
  <div id="game-container">
    <header id="hud">
      <span class="logo">World of Crypto</span>
      <div class="stats">
        <span id="hero-name">Hero</span>
        <span id="hero-level">Lv. 1</span>
        <span id="hero-gold">⛀ 0</span>
        <span id="hero-hp">❤ 100</span>
      </div>
    </header>

    <div id="stage">
      <canvas id="game" width="960" height="540"></canvas>
      <div id="class-menu" class="overlay"></div>
    </div>

    <footer id="controls">
      WASD / Arrows to move · Space to attack · E to interact · Q for class ability
    </footer>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
